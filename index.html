<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            background-color: rgba(255, 255, 255, 0.85);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #00796b;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #004d40;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #b2dfdb;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #00796b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004d40;
        }
        #resultado {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            white-space: pre-line;
            text-align: center;
        }
        .abaixo { background: #bbdefb; color: #0d47a1; }
        .normal { background: #c8e6c9; color: #1b5e20; }
        .sobrepeso { background: #fff9c4; color: #f57f17; }
        .obesidade { background: #ffcdd2; color: #b71c1c; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <h1>Calculadora de IMC</h1>
            <label>Nome:
                <input type="text" id="nome">
            </label>
            <label>Idade:
                <input type="number" id="idade">
            </label>
            <label>Peso (kg):
                <input type="number" step="0.1" id="peso">
            </label>
            <label>Altura (m):
                <input type="number" step="0.01" id="altura">
            </label>
            <button id="btnCalcular" onclick="calcularIMC()">Calcular IMC</button>

            <div id="resultado"></div>
        </div>
    </div>

    <script>
        // Correção automática
        function corrigirAltura(valor) {
            if (valor > 3) { // se digitou em cm
                return valor / 100;
            }
            return valor;
        }
        function corrigirPeso(valor) {
            if (valor > 300) { // valor exagerado
                return valor / 10;
            }
            return valor;
        }

        // Enter para avançar
        function avancarComEnter(campoAtual, campoProximo) {
            document.getElementById(campoAtual).addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    document.getElementById(campoProximo).focus();
                }
            });
        }
        avancarComEnter("nome", "idade");
        avancarComEnter("idade", "peso");
        avancarComEnter("peso", "altura");
        avancarComEnter("altura", "btnCalcular"); // agora vai até o botão

        // Cálculo IMC
        function calcularIMC() {
            const nome = document.getElementById("nome").value;
            const idade = parseInt(document.getElementById("idade").value);
            let peso = parseFloat(document.getElementById("peso").value);
            let altura = parseFloat(document.getElementById("altura").value);

            if (!nome || !idade || !peso || !altura) {
                document.getElementById("resultado").innerText = "Por favor, preencha todos os campos.";
                document.getElementById("resultado").className = "";
                return;
            }

            peso = corrigirPeso(peso);
            altura = corrigirAltura(altura);

            const imc = peso / (altura * altura);
            let mensagem = "";
            let classe = "";

            if (imc < 18.5) {
                mensagem = "Você está abaixo do peso.\nProcure um profissional para acompanhamento.";
                classe = "abaixo";
            } else if (imc < 25) {
                mensagem = "Você está com peso normal.\nSe mantenha saudável!";
                classe = "normal";
            } else if (imc < 30) {
                mensagem = "Você está com sobrepeso.\nEssa condição requer cuidado com ajuda de um profissional.";
                classe = "sobrepeso";
            } else {
                mensagem = "Você está com obesidade.\nBusque ajuda profissional, sua condição pode trazer vários problemas de saúde.";
                classe = "obesidade";
            }

            const resultado = document.getElementById("resultado");
            resultado.innerText = `Olá, ${nome}! Você tem ${idade} anos.\nSeu IMC é: ${imc.toFixed(2)}\n${mensagem}`;
            resultado.className = classe;
        }
    </script>
</body>
</html>
